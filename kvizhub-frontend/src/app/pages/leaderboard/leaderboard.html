<table class="leaderboard-table">
  <thead>
    <tr>
      <th>#</th>
      <th>User</th>
      <th>Score</th>
      <th>Date</th>
    </tr>
  </thead>

  <tbody>

    <tr *ngFor="let r of results; let i = index">

      <td>
        <span *ngIf="i === 0">🥇</span>
        <span *ngIf="i === 1">🥈</span>
        <span *ngIf="i === 2">🥉</span>
        <span *ngIf="i > 2">{{i + 1}}</span>
      </td>

      <td>{{r.username}}</td>

      <td>{{r.score}}</td>

      <td>{{r.createdAt | date:'short'}}</td>

    </tr>

  </tbody>
</table>

<button class="back-btn" (click)="goBack()"> Back </button>
